apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-authentication
  namespace: sistal
  labels:
    app: ms-authentication
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-authentication
  template:
    metadata:
      labels:
        app: ms-authentication
    spec:
      containers:
      - name: ms-authentication



# CAMBIAR






        # El pipeline de GitHub Actions (Kustomize) actualizará este tag por el Commit SHA real
        image: southamerica-east1-docker.pkg.dev/construtem/microservicios-construtem/ms-authentication:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080 # Puerto estándar de tu app Go
        
        # AQUÍ CONSUME EL CONFIGMAP MANUAL
        envFrom:
        - configMapRef:
            name: ms-authentication-config
            # optional: true # Descomenta esto si quieres que el pod inicie aunque el configmap no exista
            
        # Buenas prácticas: Límites de recursos
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
